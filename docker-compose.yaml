services:
  couchdb:
    image: couchdb:latest
    container_name: couchdb
    user: 5984:5984
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - ./data:/opt/couchdb/data
      - ./etc:/opt/couchdb/etc/local.d
    ports:
      - 5984:5984
    restart: unless-stopped
    stop_grace_period: 20s

  ntfy:
    image: binwiederhier/ntfy
    command:
      - sh
      - -c
      - "cat /usr/local/share/ca-certificates/FirewallRootCertificate.crt >> /etc/ssl/certs/ca-certificates.crt && ntfy serve"
    entrypoint: []
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      NTFY_UPSTREAM_BASE_URL: "https://ntfy.sh"
    # Required for upstream HTTP requests to ntfy servers from behind firewall
    volumes:
      - ./FirewallRootCertificate.crt:/usr/local/share/ca-certificates/FirewallRootCertificate.crt:ro
    ports:
      - "5985:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:5985/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    init: true
    stop_grace_period: 20s

  notifier:
    image: python:3.11-slim
    container_name: notifier
    working_dir: /data
    volumes:
      - ./notifier.py:/app/notifier.py
      - F:/D/Notes/Personal:/data
    environment:
      TZ: "Europe/Oslo"
      PYTHONUNBUFFERED: "1"
      COUCHDB_BASE_URL: ${COUCHDB_BASE_URL}
      COUCHDB_DATABASE: ${COUCHDB_DATABASE}
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      # Command-line arguments for notifier.py:
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      FILE_PATH: ${NOTIFIER_FILE_PATH} # Case-sensitive file path relative to vault root
      TOPIC_NAME: ${NOTIFIER_TOPIC_NAME}
    command: >
      sh -c "pip install --no-cache-dir requests &&
             python /app/notifier.py $$NTFY_BASE_URL $$FILE_PATH $$TOPIC_NAME --loop"
    restart: always